name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - miduo/68_Smooth_Zoom_Transitions
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - miduo/68_Smooth_Zoom_Transitions

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # --- 1. 添加：安装 Flutter 环境 ---
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # 开启缓存，下次运行会更快

      # --- 2. 添加：构建 Flutter Web ---
      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web

      # --- 3. 原有的部署步骤（注意：确认 output_location 正确） ---
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_PLANT_03C3CA600 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" 
          api_location: "" 
          output_location: "build/web" # 这里必须和 flutter build 生成的目录一致
          
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_PLANT_03C3CA600 }}
          action: "close"

