name: geopod
description: "Map interface to Solid Server Data Vault Pods."
publish_to: 'none'
version: 0.0.14+20

environment:
  sdk: ^3.10.0

# 20250722 gjw To automatically upgrade package dependencies:
#
#   flutter pub upgrade --major-versions
#
# To see which dependencies have newer versions available:
#
#   flutter pub outdated

dependencies:
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  file_saver: ^0.3.1
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_map: ^8.2.2
  geolocator: ^14.0.2
  http: ^1.2.2
  intl: ^0.20.1
  latlong2: ^0.9.1
  markdown_tooltip: ^0.0.10
  pdf: ^3.11.1
  printing: ^5.13.4
  shared_preferences: ^2.3.3
  solid_auth: ^0.1.28
  solidpod: ^0.9.12
  solidui: ^0.0.25
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  web: ^1.1.0
  window_manager: ^0.5.0
  universal_io: any

dependency_overrides:
  solidpod:
    git:
      url: https://github.com/anusii/solidpod.git
      ref: dev
  solidui:
    git:
      url: https://github.com/anusii/solidui.git
      ref: dev

dev_dependencies:
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/app_icon.png
    - assets/images/app_image.png
  uses-material-design: true

# 20250429 gjw Define launcher icons for all platforms (except Linux)
# so icons for the apps can be automatically updated using:
#
# `dart run flutter_launcher_icons`

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  macos:
    generate: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    icon_size: 48 # min:48, max:256, default: 48
