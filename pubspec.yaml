name: geopod
description: "Map interface to Solid Server Data Vault Pods."
publish_to: 'none'
version: 1.0.9+22

environment:
  sdk: ^3.10.0

# 20250722 gjw To automatically upgrade package dependencies:
#
#   flutter pub upgrade --major-versions
#
# To see which dependencies have newer versions available:
#
#   flutter pub outdated

dependencies:
  archive: ^4.0.9
  cupertino_icons: ^1.0.8
  emacs_text_field: ^0.1.0
  ffi: ^2.1.0
  file_picker: ^11.0.2
  file_saver: ^0.3.1
  flutter:
    sdk: flutter
  flutter_colorpicker: ^1.1.0
  flutter_map: ^8.2.2
  gap: ^3.0.1
  geolocator: ^14.0.2
  http: ^1.2.2
  intl: ^0.20.1
  latlong2: ^0.9.1
  markdown_tooltip: ^0.0.10
  path_provider: ^2.1.5
  pdf: ^3.11.1
  shared_preferences: ^2.3.3
  solidpod: ^1.0.6
  solidui: ^1.0.8
  uuid: ^4.5.1
  video_player: ^2.9.2
  video_player_media_kit: ^2.0.0
  web: ^1.1.0
  window_manager: ^0.5.0

dev_dependencies:
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/app_icon.png
    - assets/images/app_image.png
    - assets/audio/
    - assets/video/
  uses-material-design: true

# 20250429 gjw Define launcher icons for all platforms (except Linux)
# so icons for the apps can be automatically updated using:
#
# `dart run flutter_launcher_icons`

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: true
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  macos:
    generate: true
  web:
    generate: true
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    icon_size: 48 # min:48, max:256, default: 48
